    // ========== 中文匹配（高容错率） ==========
    function checkChineseMatch(studentAnswer, correctAnswer) {
      // 完全匹配
      if (studentAnswer === correctAnswer) return { match: true, reason: '完全正确' };
      
      // 空答案
      if (!studentAnswer || studentAnswer.trim() === '') return { match: false, reason: '未作答' };
      
      const student = studentAnswer.trim();
      const correct = correctAnswer.trim();
      
      // 1. 包含匹配（学生答案包含正确答案或反之）
      if (student.includes(correct) || correct.includes(student)) {
        return { match: true, reason: '意思正确' };

      // 2. 提取关键词匹配（2 字以上的词）
      const studentKeywords = extractKeywords(student);
      const correctKeywords = extractKeywords(correct);
      
      // 检查是否有共同关键词
      const commonKeywords = studentKeywords.filter(k => 
        correctKeywords.some(ck => k.includes(ck) || ck.includes(k))
      );

        '结果': ['后果', '结局'],

        '优点': ['好的', '长处', '优势'],
        '缺点': ['不好的', '短处', '劣势'],

        '完全': ['全部', '彻底'],
        '部分': ['一部分', '有些'],
        '全部': ['所有', '整个'],
        '有些': ['一些', '有的'],
        '所有': ['全部', '一切'],
        '不同': ['不一样的', '差异', '区别'],
        '相同': ['一样的', '同样的'],
        '相似': ['类似的', '相近'],
        '差异': ['差别', '区别'],
        '共同': ['一起', '共有'],
        '独特': ['独有的', '特别的'],
      };
      
      // 检查正确答案的近义词
      for (const [key, synonyms] of Object.entries(synonymGroups)) {
        if (correct.includes(key) || key.includes(correct)) {
          // 学生写了原词或近义词都算对
          if (student.includes(key) || synonyms.some(s => student.includes(s))) {
            return { match: true, reason: '近义词正确' };
          }
        }
        // 学生写的是近义词也算对
        if (synonyms.some(s => correct.includes(s))) {
          if (student.includes(key) || synonyms.some(s => student.includes(s))) {
            return { match: true, reason: '近义词正确' };
          }
        }
      }
      
      // 4. 单字匹配（如果答案只有 1-2 个字）
      if (correct.length <= 2 && student.length <= 2) {
        if (student === correct) return { match: true, reason: '完全正确' };
      }
      
      return { match: false, reason: '答案不符' };
    }
    
    // 提取关键词（2 字以上的词）
    function extractKeywords(text) {
      // 移除标点符号和空格
      const clean = text.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '');
      const keywords = [];
      
      // 提取 2-4 字的词
      for (let len = 2; len <= 4 && len <= clean.length; len++) {
        for (let i = 0; i <= clean.length - len; i++) {
          keywords.push(clean.substring(i, i + len));
        }
      }
      
      return keywords;
    }
    
    // ========== 英文严格匹配（零容错） ==========
    function checkEnglishMatch(studentAnswer, correctAnswer) {
      // 空答案
      if (!studentAnswer || studentAnswer.trim() === '') return { match: false, reason: '未作答' };
      
      const student = studentAnswer.trim().toLowerCase();
      const correct = correctAnswer.trim().toLowerCase();
      
      // 完全匹配（每个字母都必须正确）
      if (student === correct) return { match: true, reason: '完全正确' };
      
      // 字母数量错误
      if (student.length !== correct.length) {
        const diff = student.length - correct.length;
        return { 
          match: false, 
          reason: diff > 0 ? '字母过多' : '字母过少'
        };
      }
      
      // 计算错误字母数
      let diffCount = 0;
      let diffPositions = [];
      for (let i = 0; i < Math.max(student.length, correct.length); i++) {
        if (student[i] !== correct[i]) {
          diffCount++;
          diffPositions.push(i + 1);
        }
      }
      
      // 详细错误原因
      if (diffCount === 1) {
        return { 
          match: false, 
          reason: `拼写错误（第${diffPositions[0]}个字母）`
        };
      }
      if (diffCount <= 3) {
        return { 
          match: false, 
          reason: `拼写错误（${diffCount}个字母）`
        };
      }
      return { 
        match: false, 
        reason: '拼写错误'
      };
    }
    
    // ========== 同义替换匹配（宽松） ==========
    function checkSynonymMatch(studentAnswer, correctSynonyms) {
      if (!studentAnswer || studentAnswer.trim() === '') return { match: false, reason: '未作答' };
      if (!correctSynonyms || correctSynonyms.trim() === '') return { match: true, reason: '无需填写' };
      
      const student = studentAnswer.trim().toLowerCase();
      const correct = correctSynonyms.trim().toLowerCase();
      
      // 完全匹配
      if (student === correct) return { match: true, reason: '完全正确' };
      
      // 包含匹配（学生答案包含正确同义词之一）
      const synonyms = correct.split(/[,\s]+/).filter(s => s.length > 0);
      for (const synonym of synonyms) {
        if (student.includes(synonym) || synonym.includes(student)) {
          return { match: true, reason: '同义词正确' };
        }
      }
      
      return { match: false, reason: '同义词不符' };
    }

    }

    // ========== 选择听写任务 ==========
    function DictationSelect({ studentInfo, onStart, dictationType }) {
      const [dictations, setDictations] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      
      useEffect(() => {
        const available = JSON.parse(localStorage.getItem('available_dictations') || '[]');

          // 精确匹配班级代码
          const classMatch = d.classCode === studentInfo.classId;
          const typeMatch = !dictationType || d.type === dictationType;
          return classMatch && d.status === 'active' && typeMatch;
        });
        setDictations(filtered);
        if (filtered.length > 0) setSelectedId(filtered[0].id);
      }, [studentInfo.classId, dictationType]);

              <h3 className="text-lg font-semibold text-apple-gray-900 mb-2">暂无听写任务</h3>
              <p className="text-apple-gray-500 text-sm mb-6">老师还没有发布适合你班级的听写</p>
              <button onClick={() => window.location.reload()} className="btn-primary px-8 py-3 rounded-apple-lg text-white font-medium">刷新</button>
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in">
          <div className="card max-w-lg w-full p-6 animate-slide-up">
            <div className="text-center mb-6">
              <h2 className="text-xl font-semibold text-apple-gray-900 mb-1">选择听写任务</h2>
              <p className="text-apple-gray-500 text-sm">{studentInfo.name} · {studentInfo.classInfo}</p>
            </div>
            
            <div className="space-y-3 mb-6 max-h-96 overflow-y-auto">
              {dictations.map(d => (
                <div key={d.id} onClick={() => setSelectedId(d.id)}
                  className={`p-4 rounded-apple-lg border-2 cursor-pointer transition-all ${
                    selectedId === d.id ? 'border-apple-blue-500 bg-apple-blue-50' : 'border-apple-gray-200 hover:border-apple-gray-300 hover:bg-apple-gray-50'
                  }`}>
                  <div className="flex justify-between items-center">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <h3 className="font-medium text-apple-gray-900">{d.title}</h3>
                        {d.type === 'ielts' && (
                          <span className="px-2 py-0.5 rounded-apple text-xs bg-apple-purple-100 text-apple-purple-700 font-medium">同义替换</span>
                        )}
                      </div>
                      <p className="text-xs text-apple-gray-500 mt-1">{d.words.length} 个词 · {d.audioSettings.repeats}遍 × {d.audioSettings.interval}秒</p>
                    </div>
                    {selectedId === d.id && (
                      <div className="w-6 h-6 rounded-full bg-apple-blue-500 flex items-center justify-center">
                        <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                        </svg>
                      </div>
                    )}
                  </div>
                </div>
              ))}

            <button onClick={handleStart} className="btn-primary w-full py-4 rounded-apple-lg text-white font-medium text-base shadow-apple-md">
              开始听写

        </div>

    // ========== 听写测试界面 ==========
    function DictationTest({ dictation, studentInfo, onFinish }) {
      const isIELTS = dictation.type === 'ielts';
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      const [currentRepeat, setCurrentRepeat] = useState(0);
      const [answers, setAnswers] = useState(
        dictation.words.map(() => ({ english: '', chinese: '', synonym: '' }))
      );
      const [isPlaying, setIsPlaying] = useState(false);
      const [testPhase, setTestPhase] = useState('playing');
      const [countdown, setCountdown] = useState(30);
      const [showIsland, setShowIsland] = useState(false);
      const [islandMessage, setIslandMessage] = useState('');
      const [islandType, setIslandType] = useState('info');
      
      const wordIndexRef = useRef(0);
      const repeatRef = useRef(0);
      const isPlayingRef = useRef(false);
      
      const words = dictation.words;
      const totalRepeats = dictation.audioSettings.repeats;
      const interval = dictation.audioSettings.interval * 1000;
      
      const speakWord = (wordText) => {
        return new Promise((resolve) => {
          if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(wordText);
            utterance.lang = dictation.audioSettings.voice;
            utterance.rate = 0.9;
            utterance.onend = resolve;
            speechSynthesis.speak(utterance);
          } else {
            resolve();
          }
        });
      };
      
      const updateIsland = (message, type) => {
        setIslandMessage(message);
        setIslandType(type);
        setShowIsland(true);
        setTimeout(() => setShowIsland(false), 2500);
      };
      
      const playCurrentWord = async () => {
        if (wordIndexRef.current >= words.length) {
          setTestPhase('checking');
          setCountdown(30);
          updateIsland('请检查答案', 'success');
          setIsPlaying(false);
          isPlayingRef.current = false;
          return;
        }
        
        isPlayingRef.current = true;
        setIsPlaying(true);
        updateIsland(`单词 ${wordIndexRef.current + 1}/${words.length}`, 'playing');
        
        const currentWord = words[wordIndexRef.current].english;
        await speakWord(currentWord);
        await new Promise(resolve => setTimeout(resolve, interval));
        
        repeatRef.current = repeatRef.current + 1;
        
        if (repeatRef.current < totalRepeats) {
          setCurrentRepeat(repeatRef.current);
          playCurrentWord();
        } else {
          wordIndexRef.current = wordIndexRef.current + 1;
          repeatRef.current = 0;
          setCurrentWordIndex(wordIndexRef.current);
          setCurrentRepeat(0);
          setIsPlaying(false);
          isPlayingRef.current = false;
          setTimeout(playCurrentWord, 1000);
        }
      };
      
      useEffect(() => {
        if (testPhase === 'playing' && !isPlayingRef.current) playCurrentWord();
      }, [testPhase]);
      
      useEffect(() => {
        if (testPhase === 'checking' && countdown > 0) {
          const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
          return () => clearTimeout(timer);
        } else if (testPhase === 'checking' && countdown === 0) {
          handleSubmit();
        }
      }, [testPhase, countdown]);
      
      const handleAnswerChange = (index, field, value) => {
        const newAnswers = [...answers];
        newAnswers[index][field] = value;
        setAnswers(newAnswers);
      };
      
      const handleSubmit = () => {
        setTestPhase('finished');
        
        const results = words.map((word, i) => {
          const englishResult = checkEnglishMatch(answers[i].english.trim(), word.english);
          const chineseResult = checkChineseMatch(answers[i].chinese.trim(), word.chinese);
          const synonymResult = isIELTS ? checkSynonymMatch(answers[i].synonym.trim(), word.synonym) : { match: true, reason: 'N/A' };
          
          return {
            word: word.english,
            chinese: word.chinese,
            synonym: word.synonym,
            studentEnglish: answers[i].english.trim(),
            studentChinese: answers[i].chinese.trim(),
            studentSynonym: answers[i].synonym.trim(),
            englishCorrect: englishResult.match,
            chineseCorrect: chineseResult.match,
            synonymCorrect: synonymResult.match,
            englishReason: englishResult.reason,
            chineseReason: chineseResult.reason,
            synonymReason: synonymResult.reason,
            fullyCorrect: englishResult.match && chineseResult.match && synonymResult.match
          };
        });
        
        // 雅思：3 列各 1 分；普通：英文 + 中文各 1 分
        const pointsPerWord = isIELTS ? 3 : 2;
        const totalPoints = words.length * pointsPerWord;
        
        const englishCount = results.filter(r => r.englishCorrect).length;
        const chineseCount = results.filter(r => r.chineseCorrect).length;
        const synonymCount = isIELTS ? results.filter(r => r.synonymCorrect).length : 0;
        const earnedPoints = englishCount + chineseCount + synonymCount;
        
        const score = Math.round((earnedPoints / totalPoints) * 100);
        
        const result = {
          id: Date.now(),
          name: studentInfo.name,
          classInfo: studentInfo.classInfo,
          grade: studentInfo.grade,
          program: studentInfo.program,
          testType: studentInfo.testType,
          skill: studentInfo.skill,
          dictationType: dictation.type,
          dictationTitle: dictation.title,
          score,
          totalPoints,
          earnedPoints,
          englishCorrect: englishCount,
          chineseCorrect: chineseCount,
          synonymCorrect: synonymCount,
          total: words.length,
          details: results,
          date: new Date().toISOString().split('T')[0],
          timestamp: Date.now()
        };
        
        const savedResults = JSON.parse(localStorage.getItem('dictation_results') || '[]');
        savedResults.push(result);
        localStorage.setItem('dictation_results', JSON.stringify(savedResults));
        
        onFinish(result);
      };
      
      return (
        <div className="min-h-screen p-4 md:p-6 animate-fade-in">
          <DynamicIsland message={islandMessage} type={islandType} visible={showIsland} />
          
          <div className="card max-w-5xl mx-auto p-6 animate-slide-up">
            <div className="flex justify-between items-center mb-6 pb-4 border-b border-apple-gray-200">
              <div>
                <div className="flex items-center gap-2">
                  <h2 className="text-lg font-semibold text-apple-gray-900">{dictation.title}</h2>
                  {isIELTS && <span className="px-2 py-0.5 rounded-apple text-xs bg-apple-purple-100 text-apple-purple-700 font-medium">同义替换</span>}
                </div>
                <p className="text-xs text-apple-gray-500 mt-0.5">{studentInfo.name} · {studentInfo.classInfo}</p>
              </div>
              <div className="text-right">
                <p className="text-xs text-apple-gray-500">进度</p>
                <p className="text-base font-semibold text-apple-gray-900">{currentWordIndex}/{words.length}</p>
              </div>
            </div>
            
            {testPhase === 'playing' && (
              <div className="text-center mb-6">
                <div className={`inline-flex items-center gap-2 px-5 py-2.5 rounded-full ${
                  isPlaying ? 'bg-apple-blue-100 text-apple-blue-700' : 'bg-apple-gray-100 text-apple-gray-600'
                }`}>
                  <span className={`text-lg ${isPlaying ? 'animate-pulse-subtle' : ''}`}>{isPlaying ? '🔊' : '⏸️'}</span>
                  <span className="text-sm font-medium">{isPlaying ? '正在播放' : '等待播放'}</span>
                </div>
              </div>
            )}
            
            {testPhase === 'checking' && (
              <div className="text-center mb-6">
                <div className="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-apple-gray-900 text-white">
                  <span className="text-2xl font-bold tabular-nums">{countdown}</span>
                  <span className="text-sm font-medium text-apple-gray-300">秒后自动提交</span>
                </div>
              </div>
            )}
            
            <div className="mb-6">
              <div className="overflow-hidden rounded-apple-lg border border-apple-gray-200">
                <table className="w-full">
                  <thead className="bg-apple-gray-50">
                    <tr>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-apple-gray-600 w-12 uppercase tracking-wide">#</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-apple-gray-600 uppercase tracking-wide">英文</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-apple-gray-600 uppercase tracking-wide">中文</th>
                      {isIELTS && (
                        <th className="px-4 py-3 text-left text-xs font-semibold text-apple-purple-600 uppercase tracking-wide">同义替换</th>
                      )}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-apple-gray-100">
                    {words.map((word, index) => (
                      <tr 
                        key={index}
                        className={`table-row ${
                          index === currentWordIndex && testPhase === 'playing' ? 'bg-apple-blue-50' :
                          index < currentWordIndex ? 'bg-apple-gray-50' : 'bg-white'
                        }`}
                      >
                        <td className="px-4 py-3 text-xs text-apple-gray-500 font-medium tabular-nums">{index + 1}</td>
                        <td className="px-4 py-3">
                          <input
                            type="text"
                            value={answers[index].english}
                            onChange={(e) => handleAnswerChange(index, 'english', e.target.value)}
                            placeholder="English"
                            className="input-field w-full p-2.5 rounded-apple text-sm font-mono"
                            disabled={testPhase === 'finished'}
                          />
                        </td>
                        <td className="px-4 py-3">
                          <input
                            type="text"
                            value={answers[index].chinese}
                            onChange={(e) => handleAnswerChange(index, 'chinese', e.target.value)}
                            placeholder="中文释义"
                            className="input-field w-full p-2.5 rounded-apple text-sm"
                            disabled={testPhase === 'finished'}
                          />
                        </td>
                        {isIELTS && (
                          <td className="px-4 py-3">
                            <input
                              type="text"
                              value={answers[index].synonym}
                              onChange={(e) => handleAnswerChange(index, 'synonym', e.target.value)}
                              placeholder="Synonym"
                              className="input-field w-full p-2.5 rounded-apple text-sm font-mono text-apple-purple-700"
                              disabled={testPhase === 'finished'}
                            />
                          </td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            
            {testPhase === 'checking' && (
              <button onClick={handleSubmit} className="btn-success w-full py-4 rounded-apple-lg text-white font-medium text-base shadow-apple-md">
                提交答案
              </button>
            )}
            
            {testPhase === 'finished' && (
              <div className="text-center p-8 rounded-apple-xl bg-apple-green-50">
                <p className="text-lg font-medium text-apple-green-800 mb-1">✅ 已提交</p>
                <p className="text-apple-green-600 text-sm">正在查看结果...</p>
              </div>
            )}
          </div>
        </div>
      );
    }
    
    // ========== 成绩页面 ==========
    function ResultPage({ result, onRestart }) {
      const isIELTS = result.dictationType === 'ielts';
      
      useEffect(() => {
        const duration = 2000;
        const end = Date.now() + duration;
        const frame = () => {
          confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#007AFF', '#34C759', '#FF9500', '#FF2D55'] });
          confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#007AFF', '#34C759', '#FF9500', '#FF2D55'] });
          if (Date.now() < end) requestAnimationFrame(frame);
        };
        frame();
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      }, []);
      
      const getGrade = (score) => {
        if (score >= 90) return { text: '优秀', emoji: '🎉', color: 'text-apple-green-600', bg: 'bg-apple-green-50' };
        if (score >= 70) return { text: '及格', emoji: '👍', color: 'text-apple-blue-600', bg: 'bg-apple-blue-50' };
        return { text: '继续加油', emoji: '⚡️', color: 'text-apple-gray-600', bg: 'bg-apple-gray-100' };
      };
      
      const grade = getGrade(result.score);
      
      return (
        <div className="min-h-screen p-4 md:p-6 animate-fade-in">
          <div className="card max-w-3xl mx-auto p-6 animate-slide-up">
            <div className="text-center mb-6">
              <h2 className="text-xl font-semibold text-apple-gray-900 mb-1">听写成绩</h2>
              <p className="text-apple-gray-500 text-sm">{result.name} · {result.date}</p>
            </div>
            
            <div className={`text-center p-8 rounded-apple-xl mb-6 ${grade.bg}`}>
              <div className="text-5xl mb-2">{grade.emoji}</div>
              <div className={`text-5xl font-bold ${grade.color} mb-2 tabular-nums`}>{result.score}%</div>
              <div className={`text-base font-medium ${grade.color} mb-4`}>{grade.text}</div>
              
              <div className="flex justify-center gap-3 flex-wrap">
                <div className="bg-white/60 backdrop-blur px-4 py-2.5 rounded-apple-lg">
                  <div className="text-xs text-apple-gray-500 mb-1">得分</div>
                  <div className="text-lg font-semibold text-apple-gray-900 tabular-nums">{result.earnedPoints} / {result.totalPoints}</div>
                </div>
                <div className="bg-white/60 backdrop-blur px-4 py-2.5 rounded-apple-lg">
                  <div className="text-xs text-apple-gray-500 mb-1">英文</div>
                  <div className="text-lg font-semibold text-apple-green-600 tabular-nums">{result.englishCorrect} / {result.total}</div>
                </div>
                <div className="bg-white/60 backdrop-blur px-4 py-2.5 rounded-apple-lg">
                  <div className="text-xs text-apple-gray-500 mb-1">中文</div>
                  <div className="text-lg font-semibold text-apple-blue-600 tabular-nums">{result.chineseCorrect} / {result.total}</div>
                </div>
                {isIELTS && (
                  <div className="bg-white/60 backdrop-blur px-4 py-2.5 rounded-apple-lg">
                    <div className="text-xs text-apple-gray-500 mb-1">同义词</div>
                    <div className="text-lg font-semibold text-apple-purple-600 tabular-nums">{result.synonymCorrect} / {result.total}</div>
                  </div>
                )}
              </div>
            </div>
            
            {result.details && result.details.some(d => !d.fullyCorrect) && (
              <div className="mb-6">
                <h3 className="text-sm font-semibold text-apple-gray-700 mb-3 flex items-center gap-2">
                  <span>📕</span> 错题回顾
                </h3>
                <div className="space-y-2 max-h-80 overflow-y-auto">
                  {result.details.map((detail, i) => {

                    return (

                            <div className={`font-mono ${detail.englishCorrect ? 'text-apple-green-600 line-through' : 'text-red-600 font-medium'}`}>
                              {detail.studentEnglish || '—'}
                            </div>

                          </div>

                      </p>
                    </div>
                  </div>
                </div>
              </div>
            )}
            
            <div className="text-center p-5 rounded-apple-xl bg-gradient-to-r from-apple-gray-50 to-apple-gray-100 mb-6">
              <p className="text-apple-gray-700 text-sm">
                {result.score >= 90 ? '🎉 太棒了！继续保持！' :
                 result.score >= 70 ? '👍 做得不错！再接再厉！' :
                 '⚡️ 别灰心！多练习几次一定会进步！'}
              </p>
            </div>
            
            <div className="grid grid-cols-2 gap-3">
              <button onClick={onRestart} className="py-3.5 border border-apple-gray-300 rounded-apple-lg text-apple-gray-700 font-medium hover:bg-apple-gray-50 transition-colors">
                再来一次
              </button>
              <button onClick={() => window.close()} className="py-3.5 btn-primary rounded-apple-lg text-white font-medium">
                完成
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // ========== 主应用 ==========
    function App() {
      const [page, setPage] = useState('studentInfo');
      const [studentInfo, setStudentInfo] = useState(null);

      const [result, setResult] = useState(null);
      
      // 从 URL 参数获取听写类型
      const urlParams = new URLSearchParams(window.location.search);
      const dictationType = urlParams.get('type') || 'standard';
      
      const handleStudentInfoComplete = (info) => {
        setStudentInfo(info);
        setPage('select');
      };
      
      const handleDictationStart = (d) => {
        setDictation(d);
        setPage('test');
      };
      
      const handleTestFinish = (r) => {
        setResult(r);
        setPage('result');
      };
      
      const handleRestart = () => {
        setDictation(null);
        setResult(null);
        setPage('select');
      };
      
      return (
        <div>
          {page === 'studentInfo' && <StudentInfoForm onComplete={handleStudentInfoComplete} />}
          {page === 'select' && <DictationSelect studentInfo={studentInfo} onStart={handleDictationStart} dictationType={dictationType} />}
          {page === 'test' && <DictationTest dictation={dictation} studentInfo={studentInfo} onFinish={handleTestFinish} />}
          {page === 'result' && <ResultPage result={result} onRestart={handleRestart} />}
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
