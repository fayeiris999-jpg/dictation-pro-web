<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DictationPro - 教师端</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink': {
              50: '#FAFAFA', 100: '#F5F5F5', 200: '#E8E8E8', 300: '#D4D4D4',
              400: '#A3A3A3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717',
            },
            'accent': {
              50: '#F0F7FF', 100: '#E0EFFF', 200: '#B9E0FF', 300: '#7CC5FF',
              400: '#36A8FF', 500: '#0080DD', 600: '#0062B5', 700: '#005094',
            },
          },
          fontFamily: {
            serif: ['"Noto Serif SC"', 'serif'],
            sans: ['"Noto Sans SC"', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 4px 24px rgba(0, 0, 0, 0.06)',
            'soft-lg': '0 8px 40px rgba(0, 0, 0, 0.08)',
          },
          animation: { 'fade-in': 'fadeIn 0.5s ease-out', 'slide-up': 'slideUp 0.6s ease-out' },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        },
      },
    }
  </script>
  
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(180deg, #FAFAFA 0%, #F5F5F5 100%);
      min-height: 100vh;
    }
    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }
    .btn-primary {
      background: linear-gradient(135deg, #0080DD 0%, #0062B5 100%);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 2px 12px rgba(0, 128, 221, 0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 128, 221, 0.3); }
    .btn-secondary {
      background: #FFFFFF;
      border: 1.5px solid #E8E8E8;
      transition: all 0.2s;
      color: #525252;
    }
    .btn-secondary:hover { background: #FAFAFA; border-color: #D4D4D4; color: #262626; }
    .tab-active {
      background: rgba(0, 128, 221, 0.08);
      color: #0080DD;
      border-bottom: 2px solid #0080DD;
    }
    .input-field {
      background: #FAFAFA;
      border: 1.5px solid #E8E8E8;
      transition: all 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #0080DD;
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(0, 128, 221, 0.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    const API = {
      getToken: () => localStorage.getItem('dictation_token'),
      getUser: () => JSON.parse(localStorage.getItem('dictation_user') || '{}'),
      getClassStats: async (className, title = null) => {
        const token = API.getToken();
        const body = { token, className };
        if (title) body.dictationTitle = title;
        const res = await fetch('/api/stats/class', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        return await res.json();
      },
      getDictationList: async (className) => {
        const token = API.getToken();
        const res = await fetch('/api/stats/dictations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, className })
        });
        return await res.json();
      }
    };
    
    const DistributionChart = ({ stats }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !stats?.score_distribution) return;
        const ctx = canvasRef.current.getContext('2d');
        const d = stats.score_distribution;
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['90-100 分', '80-89 分', '70-79 分', '60-69 分', '60 分以下'],
            datasets: [{
              data: [d['90-100']||0, d['80-89']||0, d['70-79']||0, d['60-69']||0, d['0-59']||0],
              backgroundColor: ['#0D7A4A', '#0080DD', '#D97706', '#C41E3A', '#737373'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: { legend: { position: 'bottom', labels: { font: { family: 'Noto Sans SC' }, padding: 12 } } }
          }
        });
      }, [stats]);
      if (!stats?.score_distribution) return <div className="h-64 flex items-center justify-center text-ink-400 font-light">暂无数据</div>;
      return <div className="h-64"><canvas ref={canvasRef}></canvas></div>;
    };
    
    const RankingChart = ({ stats }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !stats?.student_ranking?.length) return;
        const ctx = canvasRef.current.getContext('2d');
        const top10 = stats.student_ranking.slice(0, 10);
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: top10.map(s => s.username),
            datasets: [{
              data: top10.map(s => s.average_score),
              backgroundColor: top10.map(s => s.average_score >= 90 ? '#0D7A4A' : s.average_score >= 80 ? '#0080DD' : s.average_score >= 70 ? '#D97706' : '#C41E3A'),
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
              x: { grid: { display: false } }
            }
          }
        });
      }, [stats]);
      if (!stats?.student_ranking?.length) return <div className="h-64 flex items-center justify-center text-ink-400 font-light">暂无数据</div>;
      return <div className="h-64"><canvas ref={canvasRef}></canvas></div>;
    };
    
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [user, setUser] = useState(null);
      const [classStats, setClassStats] = useState(null);
      const [selectedClass, setSelectedClass] = useState('');
      const [selectedDictation, setSelectedDictation] = useState('');
      const [dictations, setDictations] = useState([]);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        const userData = API.getUser();
        if (!userData || !userData.username || userData.role !== 'teacher') {
          window.location.href = '/login-v6.html';
          return;
        }
        setUser(userData);
        setSelectedClass(userData.class_name || '');
        loadClassStats(userData.class_name || '');
      }, []);
      
      const loadClassStats = async (className, title = null) => {
        if (!className) {
          setLoading(false);
          return;
        }
        setLoading(true);
        try {
          const statsRes = await API.getClassStats(className, title);
          if (statsRes?.success) {
            setClassStats(statsRes.stats);
            const dictRes = await API.getDictationList(className);
            if (dictRes?.success) setDictations(dictRes.dictations);
          }
        } catch (err) { console.error(err); }
        finally { setLoading(false); }
      };
      
      const handleLogout = () => {
        localStorage.removeItem('dictation_token');
        localStorage.removeItem('dictation_user');
        window.location.href = '/login-v6.html';
      };
      
      if (loading && !classStats) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-10 h-10 border-3 border-accent-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-ink-500 font-light">加载中...</p>
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen">
          <nav className="glass-nav sticky top-0 z-50">
            <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-2xl">👨‍🏫</span>
                <span className="font-serif font-semibold text-ink-900">DictationPro · 教师端</span>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-sm text-ink-600 font-light"><span className="font-medium">{user?.display_name || user?.username}</span></div>
                <button onClick={handleLogout} className="btn-secondary px-4 py-2 rounded-xl text-sm">登出</button>
              </div>
            </div>
          </nav>
          
          <div className="max-w-6xl mx-auto px-6 mt-8">
            <div className="flex gap-1 bg-white/60 rounded-2xl p-1.5 w-fit">
              <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-2.5 rounded-xl text-sm font-medium tab-active ${activeTab === 'dashboard' ? '' : 'text-ink-500 hover:text-ink-700'}`}>班级统计</button>
              <button onClick={() => setActiveTab('students')} className={`px-6 py-2.5 rounded-xl text-sm font-medium tab-active ${activeTab === 'students' ? '' : 'text-ink-500 hover:text-ink-700'}`}>学生排名</button>
              <button onClick={() => setActiveTab('create')} className={`px-6 py-2.5 rounded-xl text-sm font-medium tab-active ${activeTab === 'create' ? '' : 'text-ink-500 hover:text-ink-700'}`}>创建听写</button>
            </div>
          </div>
          
          <div className="max-w-6xl mx-auto px-6 py-6">
            {activeTab === 'dashboard' && (
              <div className="space-y-6 animate-slide-up">
                <div className="grid md:grid-cols-4 gap-4">
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">班级人数</p>
                    <p className="text-3xl font-serif font-semibold text-ink-900">{classStats?.total_students || 0}</p>
                  </div>
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">班级平均分</p>
                    <p className="text-3xl font-serif font-semibold text-accent-600">{classStats?.average_score || 0}</p>
                  </div>
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">最高分</p>
                    <p className="text-3xl font-serif font-semibold text-emerald-600">{classStats?.highest_score || 0}</p>
                  </div>
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">最低分</p>
                    <p className="text-3xl font-serif font-semibold text-amber-600">{classStats?.lowest_score || 0}</p>
                  </div>
                </div>
                <div className="card p-6">
                  <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">分数分布</h3>
                  <DistributionChart stats={classStats} />
                </div>
              </div>
            )}
            
            {activeTab === 'students' && (
              <div className="space-y-6 animate-slide-up">
                <div className="card p-6">
                  <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">学生排名 (Top 10)</h3>
                  <RankingChart stats={classStats} />
                </div>
                <div className="card p-6">
                  <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">完整排名</h3>
                  {classStats?.student_ranking?.length ? (
                    <div className="overflow-x-auto">
                      <table className="w-full">
                        <thead>
                          <tr className="border-b border-ink-200">
                            <th className="text-left py-3 px-4 text-xs font-medium text-ink-500">排名</th>
                            <th className="text-left py-3 px-4 text-xs font-medium text-ink-500">学生</th>
                            <th className="text-left py-3 px-4 text-xs font-medium text-ink-500">平均分</th>
                            <th className="text-left py-3 px-4 text-xs font-medium text-ink-500">听写次数</th>
                          </tr>
                        </thead>
                        <tbody>
                          {classStats.student_ranking.map((s, i) => (
                            <tr key={s.username} className="border-b border-ink-100 hover:bg-ink-50">
                              <td className="py-3 px-4">
                                <span className={`w-7 h-7 rounded-full flex items-center justify-center font-semibold text-xs ${i===0?'bg-yellow-100 text-yellow-700':i===1?'bg-ink-200 text-ink-700':i===2?'bg-amber-100 text-amber-700':'bg-ink-100 text-ink-600'}`}>{i+1}</span>
                              </td>
                              <td className="py-3 px-4 font-medium text-ink-800">{s.username}</td>
                              <td className="py-3 px-4">
                                <span className={`font-semibold ${s.average_score>=90?'text-emerald-600':s.average_score>=80?'text-accent-600':s.average_score>=70?'text-amber-600':'text-red-600'}`}>{s.average_score}分</span>
                              </td>
                              <td className="py-3 px-4 text-ink-500 font-light">{s.dictation_count}次</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : <div className="text-center py-12 text-ink-400 font-light">暂无学生数据</div>}
                </div>
              </div>
            )}
            
            {activeTab === 'create' && (
              <div className="card p-8 animate-fade-in">
                <h2 className="text-2xl font-serif font-semibold text-ink-900 mb-3">创建新听写</h2>
                <p className="text-ink-500 font-light mb-6">使用 OCR 识别或手动输入创建听写任务</p>
                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-medium text-ink-700 mb-2">听写标题</label>
                    <input type="text" className="input-field w-full px-4 py-3 rounded-xl" placeholder="例如：Unit 1 Vocabulary" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-ink-700 mb-2">选择班级</label>
                    <select className="input-field w-full px-4 py-3 rounded-xl"><option>25 级 IB IELTS 听力</option></select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-ink-700 mb-2">词表输入</label>
                    <div className="border-2 border-dashed border-ink-300 rounded-2xl p-10 text-center hover:border-accent-400 transition-colors cursor-pointer">
                      <span className="text-4xl mb-3 block">📸</span>
                      <p className="text-ink-700 font-medium mb-1">拖拽截图到此处，或点击上传</p>
                      <p className="text-sm text-ink-400 font-light">支持 OCR 识别表格图片</p>
                    </div>
                  </div>
                  <div className="flex gap-4 pt-2">
                    <button className="btn-primary px-8 py-3 rounded-xl text-white font-medium">创建听写</button>
                    <button className="btn-secondary px-8 py-3 rounded-xl font-medium">取消</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
