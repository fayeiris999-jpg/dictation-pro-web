<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DictationPro - 学生端 v8.0</title>
  
  <!-- 高级中文字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink': {
              50: '#FAFAFA', 100: '#F5F5F5', 200: '#E8E8E8', 300: '#D4D4D4',
              400: '#A3A3A3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717',
            },
            'accent': {
              50: '#F0F7FF', 100: '#E0EFFF', 200: '#B9E0FF', 300: '#7CC5FF',
              400: '#36A8FF', 500: '#0080DD', 600: '#0062B5', 700: '#005094',
            },
            'success': {
              50: '#F0FDF4', 100: '#DCFCE7', 200: '#BBF7D0', 300: '#86EFAC',
              400: '#4ADE80', 500: '#22C55E', 600: '#16A34A', 700: '#15803D',
            },
            'error': {
              50: '#FEF2F2', 100: '#FEE2E2', 200: '#FECACA', 300: '#FCA5A5',
              400: '#F87171', 500: '#EF4444', 600: '#DC2626', 700: '#B91C1C',
            }
          },
          fontFamily: {
            serif: ['"Noto Serif SC"', 'serif'],
            sans: ['"Noto Sans SC"', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 4px 24px rgba(0, 0, 0, 0.06)',
            'soft-lg': '0 8px 40px rgba(0, 0, 0, 0.08)',
            'glow': '0 0 40px rgba(0, 128, 221, 0.15)',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.6s ease-out',
            'scale-in': 'scaleIn 0.4s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
          },
        },
      },
    }
  </script>
  
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(180deg, #FAFAFA 0%, #F5F5F5 100%);
      min-height: 100vh;
    }
    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }
    .btn-primary {
      background: linear-gradient(135deg, #0080DD 0%, #0062B5 100%);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 2px 12px rgba(0, 128, 221, 0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 128, 221, 0.3); }
    .btn-success {
      background: linear-gradient(135deg, #22C55E 0%, #16A34A 100%);
      transition: all 0.3s;
      box-shadow: 0 2px 12px rgba(34, 197, 94, 0.2);
    }
    .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3); }
    .btn-secondary {
      background: #FFFFFF;
      border: 1.5px solid #E8E8E8;
      transition: all 0.2s;
      color: #525252;
    }
    .btn-secondary:hover { background: #FAFAFA; border-color: #D4D4D4; color: #262626; }
    .tab-active {
      background: rgba(0, 128, 221, 0.08);
      color: #0080DD;
      border-bottom: 2px solid #0080DD;
    }
    .input-field {
      background: #FAFAFA;
      border: 1.5px solid #E8E8E8;
      transition: all 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #0080DD;
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(0, 128, 221, 0.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const API_BASE = 'http://localhost:3000/api';
    
    // ========== API 工具 ==========
    const API = {
      getToken: () => localStorage.getItem('dictation_token'),
      getUser: () => JSON.parse(localStorage.getItem('dictation_user') || '{}'),
      
      getDictations: async () => {
        const token = API.getToken();
        const res = await fetch(`${API_BASE}/dictation/list`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        return await res.json();
      },
      
      getDictation: async (dictationId) => {
        const token = API.getToken();
        const res = await fetch(`${API_BASE}/dictation/get`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, dictationId })
        });
        return await res.json();
      },
      
      generateAudio: async (words, settings = {}) => {
        const res = await fetch(`${API_BASE}/audio/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ words, ...settings })
        });
        return await res.json();
      },
      
      correct: async (studentAnswer, standardAnswer) => {
        const res = await fetch(`${API_BASE}/correct`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentAnswer, standardAnswer, tolerance: 0.1 })
        });
        return await res.json();
      },
      
      submitScore: async (scoreData) => {
        const token = API.getToken();
        const res = await fetch(`${API_BASE}/stats/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, ...scoreData })
        });
        return await res.json();
      },
      
      getUserStats: async () => {
        const token = API.getToken();
        const res = await fetch(`${API_BASE}/stats/user`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        return await res.json();
      },
      
      getErrorAnalysis: async () => {
        const token = API.getToken();
        const res = await fetch(`${API_BASE}/stats/errors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        return await res.json();
      }
    };
    
    // ========== 图表组件 ==========
    const TrendChart = ({ stats }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !stats?.recent_scores?.length) return;
        const ctx = canvasRef.current.getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: stats.recent_scores.map((_, i) => `第${i+1}次`),
            datasets: [{
              data: stats.recent_scores.map(s => s.score),
              borderColor: '#0080DD',
              backgroundColor: 'rgba(0, 128, 221, 0.1)',
              fill: true,
              tension: 0.4,
              pointRadius: 5,
              pointHoverRadius: 7
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
              x: { grid: { display: false } }
            }
          }
        });
      }, [stats]);
      
      if (!stats?.recent_scores?.length) {
        return <div className="h-64 flex items-center justify-center text-ink-400 font-light">暂无成绩数据</div>;
      }
      return <div className="h-64"><canvas ref={canvasRef}></canvas></div>;
    };
    
    const ErrorChart = ({ errors }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !errors?.length) return;
        const ctx = canvasRef.current.getContext('2d');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: errors.slice(0, 10).map(e => e.word),
            datasets: [{
              data: errors.slice(0, 10).map(e => e.count),
              backgroundColor: 'rgba(239, 68, 68, 0.75)',
              borderRadius: 6
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
              y: { grid: { display: false } }
            }
          }
        });
      }, [errors]);
      
      if (!errors?.length) {
        return <div className="h-64 flex items-center justify-center text-ink-400 font-light">暂无错题数据</div>;
      }
      return <div className="h-64"><canvas ref={canvasRef}></canvas></div>;
    };
    
    // ========== 英文故事生成器 ==========
    function EnglishStoryGenerator({ errors }) {
      const [level, setLevel] = useState('B1');
      const [style, setStyle] = useState('fairy');
      const [story, setStory] = useState(null);
      const [loading, setLoading] = useState(false);
      const [showStory, setShowStory] = useState(false);
      
      const styleOptions = [
        { value: 'fairy', label: '🧚 童话故事', desc: '温馨梦幻' },
        { value: 'suspense', label: '🔍 悬疑故事', desc: '紧张刺激' },
        { value: 'horror', label: '👻 恐怖故事', desc: '惊悚氛围' },
        { value: 'comedy', label: '🎭 脱口秀', desc: '幽默搞笑' },
        { value: 'news', label: '📰 新闻稿', desc: '正式客观' },
        { value: 'scifi', label: '🚀 科幻故事', desc: '未来科技' }
      ];
      
      const levelOptions = [
        { value: 'A1', label: '🌱 A1 入门', desc: '50-80 词' },
        { value: 'A2', label: '🌿 A2 基础', desc: '80-120 词' },
        { value: 'B1', label: '🌳 B1 中级', desc: '120-180 词' },
        { value: 'B2', label: '🌲 B2 中高级', desc: '180-250 词' },
        { value: 'C1', label: '🏔️ C1 高级', desc: '250-350 词' },
        { value: 'C2', label: '🏆 C2 母语', desc: '350-500 词' }
      ];
      
      const handleGenerate = async () => {
        setLoading(true);
        try {
          const token = API.getToken();
          const words = errors.map(e => ({ english: e.word, chinese: '' }));
          
          const res = await fetch(`${API_BASE}/ai/generate-story`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, words, level, style })
          });
          
          const result = await res.json();
          
          if (result.success) {
            setStory(result.story);
            setShowStory(true);
          } else {
            alert('生成失败：' + result.error);
          }
        } catch (error) {
          console.error('生成失败:', error);
          alert('生成失败：' + error.message);
        } finally {
          setLoading(false);
        }
      };
      
      if (showStory && story) {
        return (
          <div className="card p-8 animate-slide-up">
            <div className="flex items-center justify-between mb-6">
              <h3 className="text-xl font-serif font-bold text-ink-900">📚 {story.title}</h3>
              <button
                onClick={() => setShowStory(false)}
                className="text-ink-400 hover:text-ink-600 transition-colors"
              >
                ✕
              </button>
            </div>
            
            {/* 故事信息 */}
            <div className="flex gap-4 mb-6">
              <span className="px-3 py-1 bg-accent-50 text-accent-700 rounded-lg text-sm font-medium">
                {levelOptions.find(l => l.value === level)?.label}
              </span>
              <span className="px-3 py-1 bg-success-50 text-success-700 rounded-lg text-sm font-medium">
                {styleOptions.find(s => s.value === style)?.label}
              </span>
              <span className="px-3 py-1 bg-ink-100 text-ink-700 rounded-lg text-sm font-medium">
                {story.word_count} 词
              </span>
            </div>
            
            {/* 英文故事 */}
            <div className="bg-gradient-to-br from-accent-50 to-success-50 rounded-2xl p-6 mb-6">
              <p className="text-ink-800 leading-relaxed text-lg font-serif">
                {story.content_en}
              </p>
            </div>
            
            {/* 中文翻译 */}
            <details className="bg-ink-50 rounded-xl p-4 mb-6">
              <summary className="text-sm font-medium text-ink-700 cursor-pointer">
                👀 查看中文翻译
              </summary>
              <p className="text-ink-600 mt-3 leading-relaxed">
                {story.content_zh}
              </p>
            </details>
            
            {/* 用到的错词 */}
            <div className="bg-ink-50 rounded-xl p-4">
              <p className="text-sm font-medium text-ink-700 mb-3">✨ 故事包含你的错词：</p>
              <div className="flex flex-wrap gap-2">
                {story.words_used?.map((word, i) => (
                  <span key={i} className="px-3 py-1 bg-error-100 text-error-700 rounded-lg text-sm font-medium">
                    {word}
                  </span>
                ))}
              </div>
            </div>
            
            {/* 操作按钮 */}
            <div className="flex gap-3 mt-6">
              <button
                onClick={handleGenerate}
                disabled={loading}
                className="btn-secondary px-6 py-3 rounded-xl font-medium"
              >
                🔄 重新生成
              </button>
              <button
                onClick={() => window.print()}
                className="btn-primary px-6 py-3 rounded-xl text-white font-medium"
              >
                📥 打印故事
              </button>
            </div>
          </div>
        );
      }
      
      return (
        <div className="card p-8 animate-fade-in">
          <h3 className="text-xl font-serif font-bold text-ink-900 mb-2">📚 AI 英文故事生成</h3>
          <p className="text-ink-500 mb-6">将你的 {errors.length} 个错词编成有趣的故事，帮助记忆</p>
          
          <div className="grid md:grid-cols-2 gap-6 mb-6">
            {/* 难度选择 */}
            <div>
              <label className="block text-sm font-medium text-ink-700 mb-3">📖 英语难度</label>
              <div className="space-y-2">
                {levelOptions.map(opt => (
                  <button
                    key={opt.value}
                    onClick={() => setLevel(opt.value)}
                    className={`w-full text-left px-4 py-3 rounded-xl transition-all ${
                      level === opt.value
                        ? 'bg-accent-100 text-accent-800 border-2 border-accent-500'
                        : 'bg-ink-50 text-ink-700 hover:bg-ink-100 border-2 border-transparent'
                    }`}
                  >
                    <div className="flex items-center justify-between">
                      <span className="font-medium">{opt.label}</span>
                      <span className="text-sm text-ink-500">{opt.desc}</span>
                    </div>
                  </button>
                ))}
              </div>
            </div>
            
            {/* 风格选择 */}
            <div>
              <label className="block text-sm font-medium text-ink-700 mb-3">🎭 故事风格</label>
              <div className="space-y-2">
                {styleOptions.map(opt => (
                  <button
                    key={opt.value}
                    onClick={() => setStyle(opt.value)}
                    className={`w-full text-left px-4 py-3 rounded-xl transition-all ${
                      style === opt.value
                        ? 'bg-success-100 text-success-800 border-2 border-success-500'
                        : 'bg-ink-50 text-ink-700 hover:bg-ink-100 border-2 border-transparent'
                    }`}
                  >
                    <div className="flex items-center justify-between">
                      <span className="font-medium">{opt.label}</span>
                      <span className="text-sm text-ink-500">{opt.desc}</span>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          </div>
          
          <button
            onClick={handleGenerate}
            disabled={loading}
            className="btn-primary w-full py-4 rounded-xl text-white font-medium text-lg disabled:opacity-50"
          >
            {loading ? '⏳ 生成中...' : '✨ 生成专属英文故事'}
          </button>
        </div>
      );
    }
    
    // ========== 听写播放器（核心功能）==========
    function DictationPlayer({ dictation, onComplete, onBack }) {
      const [currentStep, setCurrentStep] = useState('loading'); // loading, ready, answering, result
      const [audioUrl, setAudioUrl] = useState(null);
      const [studentAnswer, setStudentAnswer] = useState('');
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(false);
      const audioRef = useRef(null);
      const user = API.getUser();
      
      // 加载音频
      useEffect(() => {
        const loadAudio = async () => {
          if (dictation.audioUrl) {
            setAudioUrl(dictation.audioUrl);
            setCurrentStep('ready');
          } else {
            setLoading(true);
            try {
              const result = await API.generateAudio(dictation.words, {
                voice: 'zh-CN-XiaoxiaoNeural',
                speed: 1.0,
                interval: 3
              });
              if (result.success) {
                setAudioUrl(result.audioUrl);
                setCurrentStep('ready');
              } else {
                alert('音频生成失败：' + result.error);
              }
            } catch (error) {
              console.error('音频加载失败:', error);
              alert('无法连接音频服务');
            }
            setLoading(false);
          }
        };
        loadAudio();
      }, [dictation]);
      
      // 提交批改
      const handleSubmit = async () => {
        if (!studentAnswer.trim()) {
          alert('⚠️ 请输入你的答案');
          return;
        }
        
        setLoading(true);
        try {
          const standardAnswer = dictation.words.map(w => w.english).join(', ');
          const result = await API.correct(studentAnswer, standardAnswer);
          
          if (result.success) {
            setReport(result.report);
            setCurrentStep('result');
            
            // 播放庆祝动画
            if (result.report.score >= 90) {
              confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
              });
            }
            
            // 保存成绩
            await API.submitScore({
              dictationId: dictation.id,
              dictationTitle: dictation.title,
              score: result.report.score,
              correctCount: result.report.correctCount,
              totalWords: result.report.totalWords,
              corrections: result.report.corrections
            });
          } else {
            alert('❌ 批改失败：' + result.error);
          }
        } catch (error) {
          console.error('批改失败:', error);
          alert('❌ 无法连接批改服务');
        } finally {
          setLoading(false);
        }
      };
      
      const handleRestart = () => {
        setStudentAnswer('');
        setReport(null);
        setCurrentStep('ready');
        if (audioRef.current) {
          audioRef.current.currentTime = 0;
        }
      };
      
      if (loading && currentStep === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 border-4 border-accent-200 border-t-accent-500 rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-ink-500 font-light">正在加载音频...</p>
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen p-6 animate-fade-in">
          <div className="max-w-4xl mx-auto">
            {/* 返回按钮 */}
            <button onClick={onBack} className="text-ink-500 hover:text-ink-700 mb-4 text-sm flex items-center gap-2">
              ← 返回列表
            </button>
            
            {/* 听写信息卡片 */}
            <div className="card p-6 mb-6">
              <h2 className="text-xl font-serif font-semibold text-ink-900 mb-2">{dictation.title}</h2>
              <p className="text-ink-500 text-sm">{dictation.classLabel} · 共 {dictation.words.length} 个单词</p>
            </div>
            
            {/* Step 1: 准备阶段 */}
            {currentStep === 'ready' && (
              <div className="card p-8 text-center animate-slide-up">
                <div className="w-20 h-20 bg-accent-50 rounded-full flex items-center justify-center mx-auto mb-4">
                  <span className="text-4xl">🎧</span>
                </div>
                <h3 className="text-lg font-serif font-semibold text-ink-900 mb-2">准备开始听写</h3>
                <p className="text-ink-500 mb-6">
                  请先听音频，然后点击"开始答题"输入答案
                </p>
                
                {audioUrl && (
                  <audio ref={audioRef} controls src={audioUrl} className="mb-6 w-full max-w-md" />
                )}
                
                <button
                  onClick={() => setCurrentStep('answering')}
                  className="btn-primary px-8 py-3 rounded-xl text-white font-medium"
                >
                  开始答题
                </button>
              </div>
            )}
            
            {/* Step 2: 答题阶段 */}
            {currentStep === 'answering' && (
              <div className="card p-6 animate-slide-up">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-base font-serif font-semibold text-ink-900">✏️ 输入答案</h3>
                  {audioUrl && (
                    <audio controls src={audioUrl} className="h-10" />
                  )}
                </div>
                
                <textarea
                  value={studentAnswer}
                  onChange={(e) => setStudentAnswer(e.target.value)}
                  placeholder="输入你听到的单词，用逗号或空格分隔..."
                  className="input-field w-full p-4 rounded-xl text-sm min-h-[200px] resize-y font-mono"
                />
                
                <div className="flex gap-3 mt-4">
                  <button onClick={() => setCurrentStep('ready')} className="btn-secondary flex-1 py-3 rounded-xl font-medium">
                    返回
                  </button>
                  <button
                    onClick={handleSubmit}
                    disabled={loading || !studentAnswer.trim()}
                    className="btn-success flex-1 py-3 rounded-xl text-white font-medium disabled:opacity-50"
                  >
                    {loading ? '⏳ 提交中...' : '✅ 提交答案'}
                  </button>
                </div>
              </div>
            )}
            
            {/* Step 3: 结果页面 */}
            {currentStep === 'result' && report && (
              <div className="animate-slide-up">
                <div className={`card p-8 text-center mb-6 ${
                  report.score >= 90 ? 'bg-success-50' :
                  report.score >= 70 ? 'bg-accent-50' :
                  'bg-ink-50'
                }`}>
                  <div className="text-5xl mb-3">
                    {report.score >= 90 ? '🎉' : report.score >= 70 ? '👍' : '💪'}
                  </div>
                  <h2 className="text-4xl font-serif font-bold text-ink-900 mb-2">{report.score}分</h2>
                  <p className="text-ink-600 mb-4">正确率：{report.correctRate}%</p>
                  <p className="text-lg font-medium text-ink-700">{report.feedback}</p>
                </div>
                
                <div className="card p-6 mb-6">
                  <h3 className="text-base font-serif font-semibold text-ink-900 mb-4">📊 详细结果</h3>
                  <div className="grid grid-cols-3 gap-4 text-center">
                    <div className="p-4 bg-ink-50 rounded-xl">
                      <p className="text-2xl font-bold text-ink-900">{report.totalWords}</p>
                      <p className="text-xs text-ink-500 mt-1">总单词数</p>
                    </div>
                    <div className="p-4 bg-success-50 rounded-xl">
                      <p className="text-2xl font-bold text-success-600">{report.correctCount}</p>
                      <p className="text-xs text-success-600 mt-1">正确</p>
                    </div>
                    <div className="p-4 bg-error-50 rounded-xl">
                      <p className="text-2xl font-bold text-error-600">{report.errorCount}</p>
                      <p className="text-xs text-error-600 mt-1">错误</p>
                    </div>
                  </div>
                </div>
                
                {report.corrections.length > 0 && (
                  <div className="card p-6 mb-6">
                    <h3 className="text-base font-serif font-semibold text-ink-900 mb-4">❌ 错题分析</h3>
                    <div className="space-y-2">
                      {report.corrections.map((c, i) => (
                        <div key={i} className="flex items-center justify-between p-3 bg-error-50 rounded-xl">
                          <div className="flex items-center gap-3">
                            <span className="w-6 h-6 bg-error-200 text-error-700 rounded-full flex items-center justify-center font-semibold text-xs">{i+1}</span>
                            <span className="font-medium text-ink-800 line-through">{c.actual}</span>
                            <span className="text-ink-400">→</span>
                            <span className="font-semibold text-success-600">{c.expected}</span>
                          </div>
                          <span className="text-xs text-ink-500 bg-ink-100 px-2 py-1 rounded">
                            {c.type === 'spelling_error' ? '拼写错误' : c.type === 'case_error' ? '大小写' : '其他'}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                
                <div className="flex gap-3">
                  <button onClick={handleRestart} className="btn-secondary flex-1 py-3 rounded-xl font-medium">
                    再来一次
                  </button>
                  <button onClick={onComplete} className="btn-primary flex-1 py-3 rounded-xl text-white font-medium">
                    返回主页
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    
    // ========== 主应用 ==========
    function App() {
      const [activeTab, setActiveTab] = useState('dictation');
      const [user, setUser] = useState(null);
      const [stats, setStats] = useState(null);
      const [errors, setErrors] = useState([]);
      const [dictations, setDictations] = useState([]);
      const [selectedDictation, setSelectedDictation] = useState(null);
      const [loading, setLoading] = useState(true);
      const [exporting, setExporting] = useState(null);
      
      useEffect(() => {
        const userData = API.getUser();
        if (!userData.username) {
          window.location.href = '/login-v6.html';
          return;
        }
        setUser(userData);
        loadDictations();
        loadStats();
      }, []);
      
      const loadDictations = async () => {
        try {
          const result = await API.getDictations();
          if (result.success) {
            setDictations(result.dictations);
          }
        } catch (error) {
          console.error('加载听写列表失败:', error);
        }
      };
      
      const loadStats = async () => {
        try {
          const [statsRes, errorsRes] = await Promise.all([
            API.getUserStats(),
            API.getErrorAnalysis()
          ]);
          if (statsRes.success) setStats(statsRes.stats);
          if (errorsRes.success) setErrors(errorsRes.errors);
        } catch (error) {
          console.error('加载统计失败:', error);
        } finally {
          setLoading(false);
        }
      };
      
      const handleExport = async (type) => {
        setExporting(type);
        try {
          const token = API.getToken();
          const userData = API.getUser();
          
          if (type === 'excel') {
            // 导出成绩 Excel
            const res = await fetch(`${API_BASE}/export/excel`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token })
            });
            const result = await res.json();
            if (result.success) {
              window.open(`http://localhost:3000${result.download_url}`, '_blank');
            } else {
              alert('导出失败：' + result.error);
            }
          } else if (type === 'pdf') {
            // 导出错题本 PDF
            const res = await fetch(`${API_BASE}/export/error-book`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token, user_id: userData.user_id })
            });
            const result = await res.json();
            if (result.success) {
              window.open(`http://localhost:3000${result.download_url}`, '_blank');
            } else {
              alert('导出失败：' + result.error);
            }
          } else if (type === 'report') {
            // 生成学习报告
            const res = await fetch(`${API_BASE}/report/generate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token, user_id: userData.user_id, period: 'weekly' })
            });
            const result = await res.json();
            if (result.success) {
              window.open(`http://localhost:3000${result.download_url}`, '_blank');
            } else {
              alert('生成失败：' + result.error);
            }
          }
        } catch (error) {
          console.error('导出失败:', error);
          alert('导出失败：' + error.message);
        } finally {
          setExporting(null);
        }
      };
      
      const handleLogout = () => {
        localStorage.removeItem('dictation_token');
        localStorage.removeItem('dictation_user');
        window.location.href = '/login-v6.html';
      };
      
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-10 h-10 border-3 border-accent-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-ink-500 font-light">加载中...</p>
            </div>
          </div>
        );
      }
      
      // 如果选择了听写任务，显示播放器
      if (selectedDictation) {
        return (
          <DictationPlayer
            dictation={selectedDictation}
            onComplete={() => {
              setSelectedDictation(null);
              loadStats();
            }}
            onBack={() => setSelectedDictation(null)}
          />
        );
      }
      
      return (
        <div className="min-h-screen">
          {/* 导航栏 */}
          <nav className="glass-nav sticky top-0 z-50">
            <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-2xl">🎧</span>
                <span className="font-serif font-semibold text-ink-900">DictationPro</span>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-sm text-ink-600 font-light">
                  <span className="font-medium">{user?.display_name || user?.username}</span>
                  {user?.class_name && <span className="text-ink-400 ml-2">| {user.class_name}</span>}
                </div>
                <button onClick={handleLogout} className="btn-secondary px-4 py-2 rounded-xl text-sm">登出</button>
              </div>
            </div>
          </nav>
          
          {/* 标签页切换 */}
          <div className="max-w-6xl mx-auto px-6 mt-8">
            <div className="flex gap-1 bg-white/60 rounded-2xl p-1.5 w-fit">
              <button onClick={() => setActiveTab('dictation')} className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === 'dictation' ? 'tab-active' : 'text-ink-500 hover:text-ink-700'}`}>听写练习</button>
              <button onClick={() => setActiveTab('memory')} className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === 'memory' ? 'tab-active' : 'text-ink-500 hover:text-ink-700'}`}>🧠 AI 记忆</button>
              <button onClick={() => setActiveTab('stats')} className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === 'stats' ? 'tab-active' : 'text-ink-500 hover:text-ink-700'}`}>学习统计</button>
              <button onClick={() => setActiveTab('errors')} className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === 'errors' ? 'tab-active' : 'text-ink-500 hover:text-ink-700'}`}>错题本</button>
            </div>
          </div>
          
          {/* 主内容区 */}
          <div className="max-w-6xl mx-auto px-6 py-8">
            {/* AI 记忆技巧 */}
            {activeTab === 'memory' && (
              <div className="space-y-6 animate-fade-in">
                <div className="card p-8">
                  <h2 className="text-2xl font-serif font-semibold text-ink-900 mb-3">🧠 AI 单词记忆</h2>
                  <p className="text-ink-500 font-light mb-6">基于你的错题，生成个性化记忆方案</p>
                  
                  <button
                    onClick={() => window.open('/ai-memory.html', '_blank')}
                    className="btn-primary px-8 py-3 rounded-xl text-white font-medium"
                  >
                    打开 AI 记忆工具 →
                  </button>
                </div>
                
                {/* 快速记忆入口 */}
                {errors.length > 0 && (
                  <div className="card p-6">
                    <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">📚 你的高频错题</h3>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {errors.slice(0, 10).map((error, i) => (
                        <span key={i} className="px-3 py-1 bg-accent-50 text-accent-700 rounded-lg text-sm font-medium">
                          {error.word}
                        </span>
                      ))}
                    </div>
                    <p className="text-sm text-ink-500">
                      共 {errors.length} 个错题，点击上方按钮使用 AI 生成记忆技巧
                    </p>
                  </div>
                )}
              </div>
            )}
            
            {/* 听写练习 */}
            {activeTab === 'dictation' && (
              <div className="card p-8 animate-fade-in">
                <h2 className="text-2xl font-serif font-semibold text-ink-900 mb-3">听写练习</h2>
                <p className="text-ink-500 font-light mb-6">选择老师发布的听写任务开始练习</p>
                
                {dictations.length === 0 ? (
                  <div className="text-center py-12">
                    <span className="text-5xl mb-4 block">📭</span>
                    <p className="text-ink-500">暂无可用听写任务</p>
                    <p className="text-ink-400 text-sm mt-2">请老师先创建听写内容</p>
                  </div>
                ) : (
                  <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {dictations.map(d => (
                      <div
                        key={d.id}
                        onClick={() => setSelectedDictation({...d, classLabel: user.class_name})}
                        className="border border-ink-200 rounded-2xl p-6 hover:shadow-soft transition-all cursor-pointer"
                      >
                        <div className="flex items-center justify-between mb-3">
                          <span className="text-xs font-medium text-accent-600 bg-accent-50 px-2.5 py-1 rounded-lg">Unit</span>
                          <span className="text-xs text-ink-400">{d.word_count} 词</span>
                        </div>
                        <h3 className="font-medium text-ink-800 mb-2">{d.title}</h3>
                        <p className="text-sm text-ink-500 font-light mb-4">点击开始听写</p>
                        <button className="btn-primary w-full py-2.5 rounded-xl text-white text-sm font-medium">开始听写</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            
            {/* 学习统计 */}
            {activeTab === 'stats' && (
              <div className="space-y-6 animate-slide-up">
                <div className="grid md:grid-cols-4 gap-4">
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">总听写次数</p>
                    <p className="text-3xl font-serif font-semibold text-ink-900">{stats?.total_dictations || 0}</p>
                  </div>
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">平均分</p>
                    <p className="text-3xl font-serif font-semibold text-accent-600">{stats?.average_score || 0}</p>
                  </div>
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">最高分</p>
                    <p className="text-3xl font-serif font-semibold text-success-600">{stats?.best_score || 0}</p>
                  </div>
                  <div className="card p-6">
                    <p className="text-sm text-ink-500 font-light mb-1">学习趋势</p>
                    <p className="text-3xl">{stats?.trend === 'improving' ? '📈' : stats?.trend === 'declining' ? '📉' : '➡️'}</p>
                    <p className="text-xs text-ink-400 font-light mt-1">{stats?.trend === 'improving' ? '进步中' : stats?.trend === 'declining' ? '需努力' : '稳定'}</p>
                  </div>
                </div>
                <div className="card p-6">
                  <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">成绩趋势</h3>
                  <TrendChart stats={stats} />
                </div>
                <div className="flex gap-4">
                  <button onClick={() => handleExport('excel')} disabled={exporting === 'excel'} className="btn-success px-6 py-3 rounded-xl text-white font-medium disabled:opacity-50">{exporting === 'excel' ? '导出中...' : '📊 导出 Excel'}</button>
                  <button onClick={() => handleExport('pdf')} disabled={exporting === 'pdf'} className="btn-primary px-6 py-3 rounded-xl text-white font-medium disabled:opacity-50">{exporting === 'pdf' ? '导出中...' : '📝 错题本 PDF'}</button>
                  <button onClick={() => handleExport('report')} disabled={exporting === 'report'} className="btn-secondary px-6 py-3 rounded-xl font-medium disabled:opacity-50">{exporting === 'report' ? '生成中...' : '📈 学习报告'}</button>
                </div>
              </div>
            )}
            
            {/* 错题本 */}
            {activeTab === 'errors' && (
              <div className="space-y-6 animate-slide-up">
                <div className="card p-6">
                  <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">错题分析</h3>
                  <ErrorChart errors={errors} />
                </div>
                
                {/* 英文故事生成 */}
                {errors.length > 0 && (
                  <EnglishStoryGenerator errors={errors} />
                )}
                
                <div className="card p-6">
                  <h3 className="text-lg font-serif font-medium text-ink-800 mb-4">错题列表</h3>
                  {errors.length === 0 ? (
                    <div className="text-center py-12 text-ink-400 font-light">
                      <span className="text-4xl mb-4 block">🎉</span>
                      太棒了！目前没有错题～
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {errors.map((error, i) => (
                        <div key={i} className="flex items-center justify-between p-4 bg-error-50 rounded-xl">
                          <div className="flex items-center gap-4">
                            <span className="w-7 h-7 bg-error-100 text-error-600 rounded-full flex items-center justify-center font-semibold text-xs">{i+1}</span>
                            <span className="font-medium text-ink-800">{error.word}</span>
                          </div>
                          <div className="flex items-center gap-4">
                            <span className="text-sm text-ink-500 font-light">错误 {error.count} 次</span>
                            <span>{error.count === 1 ? '⭐' : error.count === 2 ? '⭐⭐' : error.count <= 4 ? '⭐⭐⭐' : '⭐⭐⭐⭐'}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
